[[params.applications]]
title       = "Wearables & Body Electronics"
description = "Flexible and stretchable circuits conforming to body geometry. Biosensing electrodes, ECG patches, and motion sensors printed on wearable substrates."
image       = "/images/05_coil_former.png"

[[params.applications]]
title       = "Aerospace & Defence"
description = "Conformal antennas on aerodynamic surfaces. Weight-optimised circuits with embedded passives eliminating discrete component mass."
image       = "/images/05_nylon_powder.png"

[[params.applications]]
title       = "Medical Devices"
description = "Biocompatible printed circuits for implantable and disposable diagnostic devices. Single-use biosensor arrays and lab-on-chip substrates."
image       = "/images/06_dental_sla.png"

[[params.servicesPreview]]
