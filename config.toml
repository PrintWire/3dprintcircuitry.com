baseURL = "https://3dprintcircuitry.com/"
languageCode = "en-us"
title = "3D Print Circuitry"

[outputs]
  home = ["HTML", "JSON"]

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

# All single-value params MUST come before [[params.*]] array tables
[params]
siteName      = "3D Print Circuitry"
logoHtml      = '3D&nbsp;PRINT&nbsp;<span class="ed-logo-accent">CIRCUITRY</span>'
tagline       = "Additive Electronics — From Trace to Device."
description   = "3D Print Circuitry — additive manufacturing for electronics, covering printed enclosures, antennas, connectors, coils, conductive inks, and a directory connecting engineers to suppliers."
keywords      = "3D printed electronics, additive electronics, printed PCB, aerosol jet printing, conductive ink, embedded components, conformal electronics, printed antennas, printed sensors"
logoEmoji     = "⚡"
contactEmail  = "maxdavisgroup@gmail.com"
ogImage       = "/images/c02_rf_antenna.png"
footerServicesLabel = "Suppliers"

[[menu.main]]
