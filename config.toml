image       = "/images/06_processor_heatsink.png"

[[params.services]]
name        = "Embedded Component Printing"
description = "Resistors, capacitors, and inductors printed directly into the circuit substrate. Eliminates discrete component placement for space-constrained IoT and wearable designs."
icon        = "⚙️"
image       = "/images/07_cable_gland.png"

[[params.services]]
name        = "Conformal & 3D Electronics"
